input {
  file {
    path => "/var/lib/docker/containers/*/*.log"
    start_position => "end"
    ignore_older => "12h"
    close_older => "10m"
    sincedb_path => "/usr/share/logstash/data/sincedb"
    codec => json
  }
}

filter {
  if [attrs][com.docker.compose.service] {
    mutate {
      add_field => { "service" => "%{[attrs][com.docker.compose.service]}" }
    }
  } else if [attrs][container_name] {
    mutate {
      add_field => { "service" => "%{[attrs][container_name]}" }
    }
  }

  if ![attrs][ai_log] or [attrs][ai_log] != "true" {
    drop { }
  }

  if [attrs][com.docker.compose.service] and !([attrs][com.docker.compose.service] in ["ai-runtime", "ai-ops"]) {
    drop { }
  }

  if [log] {
    mutate {
      rename => { "log" => "message" }
    }
  }

  if [time] {
    date {
      match => ["time", "ISO8601"]
      target => "@timestamp"
    }
  }

  if [message] {
    json {
      source => "message"
      target => "app"
      tag_on_failure => []
    }
  }

  if [app][time] {
    date {
      match => ["[app][time]", "ISO8601"]
      target => "@timestamp"
    }
  }

  if [app][level] and [app][level] == "DEBUG" {
    drop { }
  }

  grok {
    match => { "path" => "/var/lib/docker/containers/%{DATA:container_id}/%{DATA}.log" }
    tag_on_failure => []
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    ilm_enabled => true
    ilm_rollover_alias => "ai-service-logs"
    ilm_pattern => "000001"
    ilm_policy => "ai-service-logs-7d"
  }
}
