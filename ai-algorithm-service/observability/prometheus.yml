global:
  scrape_interval: 10s
  scrape_timeout: 5s
  external_labels:
    system: rlops-traffic-signal

scrape_configs:
  - job_name: ai-runtime
    metrics_path: /metrics
    static_configs:
      - targets: ["ai-runtime:8000"]
        labels:
          role: runtime

  - job_name: ai-ops
    metrics_path: /metrics
    static_configs:
      - targets: ["ai-ops:8002"]
        labels:
          role: ops
